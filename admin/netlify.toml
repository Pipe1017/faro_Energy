# Sitio Netlify aparte para el back-office (admin.faroenergy.lat).
# IMPORTANTE: al crear el sitio, en la UI de Netlify pon "Base directory = admin".
# Con eso Netlify lee ESTE archivo (no el netlify.toml raíz de la landing) y las
# rutas de abajo quedan relativas a admin/. Por eso aquí NO se vuelve a poner base.
[build]
  command = "npm run build"
  publish = "dist"

# SPA: todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
