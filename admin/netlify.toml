# Sitio Netlify aparte para el back-office (admin.faroenergy.lat).
# Conectar como un SEGUNDO sitio en Netlify con base directory = "admin".
[build]
  base = "admin"
  command = "npm run build"
  publish = "dist"

# SPA: todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
