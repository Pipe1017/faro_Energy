<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 64" role="img" aria-label="Faro Energy — carga inteligente">
  <!--
    Faro Energy — logo "Faro Claro" v3 (lockup compacto)
    Cobre #b45309 · Espresso #2b2520 · Sin gradientes
    Símbolo solo: usar el <g> con viewBox "0 0 44 64"
  -->
  <g transform="translate(22,32) scale(0.7) translate(-48,-59)">
    <!-- Techo -->
    <path d="M48 16 L62 30 L34 30 Z" fill="#2b2520"/>
    <!-- Linterna -->
    <path d="M35 30 L61 30 L62 40 L34 40 Z" fill="#b45309"/>
    <!-- Torre -->
    <path d="M34 40 L62 40 L66 96 L30 96 Z" fill="#2b2520"/>
    <!-- Rayo calado -->
    <path d="M51 46 L42 68 L48 68 L45 88 L57 64 L51 64 Z" fill="#faf7f1"/>
    <!-- Base -->
    <rect x="27" y="95" width="42" height="7" rx="2" fill="#b45309"/>
  </g>
  <text x="48" y="36" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="30" font-weight="800" letter-spacing="-0.8"><tspan fill="#2b2520">Faro</tspan><tspan fill="#b45309" dx="7">Energy</tspan></text>
  <text x="49" y="54" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="10.5" font-weight="700" letter-spacing="2.6" fill="#6b5d4a">CARGA INTELIGENTE</text>
</svg>
