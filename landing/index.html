<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faro Energy — Carga eléctrica inteligente en Colombia</title>
  <meta name="description" content="La red de recarga de vehículos eléctricos en Medellín. Carga tu carro o gana dinero con tu cargador." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Faro Energy — Carga eléctrica inteligente" />
  <meta property="og:description" content="Carga tu carro eléctrico o gana dinero con tu cargador. Medellín." />
  <meta property="og:image"       content="https://faroenergy.lat/CargadoresEnEstacionamiento.jpg" />
  <meta property="og:url"         content="https://faroenergy.lat" />
  <meta property="og:locale"      content="es_CO" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:image"       content="https://faroenergy.lat/CargadoresEnEstacionamiento.jpg" />
  <script type="module" src="/src/main.js"></script>
</head>
<body>

  <!-- Logo centrado -->
  <div class="splash-brand">
    <svg width="24" height="39" viewBox="36 28 48 78" aria-hidden="true">
      <rect x="52" y="44" width="16" height="14" rx="3" fill="#b45309"/>
      <path d="M50 44 L60 34 L70 44 Z" fill="#2b2520"/>
      <path d="M53 58 L67 58 L72 98 L48 98 Z" fill="#2b2520"/>
      <path d="M62 64 L55 80 L60 80 L57 92 L66 75 L61 75 Z" fill="#faf7f1"/>
      <rect x="42" y="98" width="36" height="5" rx="2.5" fill="#b45309"/>
    </svg>
    <span>Faro<span style="color:#b45309;">Energy</span></span>
  </div>

  <!-- Pantalla dividida: dos caminos -->
  <main class="split split--full">
    <a href="/conductores.html" class="split__half split__half--conductor">
      <div class="split__inner">
        <span class="split__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </span>
        <div class="split__label">Quiero cargar mi vehículo</div>
        <h2 class="split__title">Soy conductor</h2>
        <p class="split__text">Encuentra puntos de carga en toda la red y paga solo lo que usas.</p>
        <span class="split__cta">Entrar a la red de carga</span>
        <div class="split__phone phone">
          <div class="phone__notch"></div>
          <img src="/MapaDeCargadores.jpeg" alt="Mapa de cargadores" />
        </div>
      </div>
    </a>
    <a href="/negocio.html" class="split__half split__half--dueno">
      <div class="split__inner">
        <span class="split__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
            <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
            <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>
            <path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>
          </svg>
        </span>
        <div class="split__label">Quiero ganar dinero</div>
        <h2 class="split__title">Negocio de carga</h2>
        <p class="split__text">Hoteles, centros comerciales y parqueaderos: genera ingresos con tu espacio.</p>
        <span class="split__cta">Ver el negocio</span>
        <div class="split__phone phone">
          <div class="phone__notch"></div>
          <img src="/GananciadeDuenoDeCargador.jpeg" alt="Ganancias del dueño" />
        </div>
      </div>
    </a>
  </main>

</body>
</html>
