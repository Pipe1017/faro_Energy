# Producción de prueba — todo el stack en el servidor Ubuntu:
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: cpo_db
    volumes:
      - faro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      # dentro de la red de compose, la DB se llama "db" (no localhost)
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@db:5432/cpo_db
    ports:
      - "8000:8000"

volumes:
  faro_pgdata:
